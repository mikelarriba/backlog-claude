services:
  backlog-claude:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - ./docs:/app/docs
      - ./inbox:/app/inbox
      - ./audit.log:/app/audit.log
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
